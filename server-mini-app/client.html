<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .health-status {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .status-item {
            flex: 1;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .status-label {
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 18px;
            color: #333;
            word-break: break-all;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
            font-style: italic;
        }

        .error {
            color: #d32f2f;
            padding: 15px;
            background: #ffebee;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .methods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .method-tag {
            padding: 8px 12px;
            background: #e0e7ff;
            border-radius: 6px;
            color: #667eea;
            font-size: 12px;
            font-family: monospace;
            word-break: break-word;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .metric-box {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AURA Mini App Server</h1>

        <div class="card">
            <h2>Server Health</h2>
            <div id="healthStatus" class="health-status">
                <div class="loading">Loading...</div>
            </div>
            <div class="buttons">
                <button onclick="checkHealth()">Refresh Health</button>
                <button onclick="getDbMethods()">Load DB Methods</button>
                <button onclick="getMetrics()">Get Metrics</button>
                <button onclick="resetMetrics()">Reset Metrics</button>
            </div>
        </div>

        <div class="card">
            <h2>Available DB Methods</h2>
            <div id="methodsSection">
                <div class="loading">Click "Load DB Methods" to see available methods</div>
            </div>
        </div>

        <div class="card">
            <h2>Server Metrics</h2>
            <div id="metricsSection">
                <div class="loading">Click "Get Metrics" to load metrics</div>
            </div>
        </div>

        <div class="card">
            <h2>Bootstrap Home Data</h2>
            <div class="buttons">
                <button onclick="bootstrapHome()">Load Home Data</button>
            </div>
            <div id="homeDataSection" style="display: none;">
                <pre id="homeDataPre"></pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8787';

        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();

                let html = '';
                if (data.ok) {
                    html = `
                        <div class="status-item">
                            <div class="status-label">Status</div>
                            <div class="status-value">✓ Connected</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">Database</div>
                            <div class="status-value">${data.hasDb ? '✓ Available' : '✗ Not Available'}</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">DB Path</div>
                            <div class="status-value">${data.dbPath || 'N/A'}</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">Mode</div>
                            <div class="status-value">${data.mode}</div>
                        </div>
                    `;
                } else {
                    html = `<div class="error">${data.error}</div>`;
                }

                document.getElementById('healthStatus').innerHTML = html;
            } catch (error) {
                document.getElementById('healthStatus').innerHTML = `<div class="error">Connection error: ${error.message}</div>`;
            }
        }

        async function getDbMethods() {
            try {
                const response = await fetch(`${API_BASE}/api/db/methods`);
                const data = await response.json();

                if (data.ok && data.methods) {
                    const methodsHtml = data.methods
                        .sort()
                        .map(method => `<div class="method-tag">${method}</div>`)
                        .join('');

                    document.getElementById('methodsSection').innerHTML = `
                        <p style="margin-bottom: 15px; color: #666;">Total: ${data.methods.length} methods</p>
                        <div class="methods-grid">${methodsHtml}</div>
                    `;
                } else {
                    document.getElementById('methodsSection').innerHTML = `<div class="error">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('methodsSection').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function getMetrics() {
            try {
                const response = await fetch(`${API_BASE}/api/metrics`);
                const data = await response.json();

                if (data.ok && data.metrics) {
                    const m = data.metrics;
                    const uptime = new Date(m.uptimeMs).toISOString().substr(11, 8);

                    document.getElementById('metricsSection').innerHTML = `
                        <div class="metrics-grid">
                            <div class="metric-box">
                                <div class="metric-value">${m.totalCalls}</div>
                                <div class="metric-label">Total Calls</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${m.totalErrors}</div>
                                <div class="metric-label">Total Errors</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${m.avgMsPerCall.toFixed(2)}</div>
                                <div class="metric-label">Avg Time (ms)</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${m.callsPerMinute.toFixed(1)}</div>
                                <div class="metric-label">Calls/min</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${uptime}</div>
                                <div class="metric-label">Uptime</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${m.batchRequestsCount}</div>
                                <div class="metric-label">Batch Requests</div>
                            </div>
                        </div>
                        <h3 style="margin-top: 20px; margin-bottom: 10px; font-size: 14px;">Top Methods by Calls</h3>
                        <pre>${JSON.stringify(m.topByCalls, null, 2)}</pre>
                    `;
                } else {
                    document.getElementById('metricsSection').innerHTML = `<div class="error">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('metricsSection').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function resetMetrics() {
            try {
                const response = await fetch(`${API_BASE}/api/metrics/reset`, { method: 'POST' });
                const data = await response.json();
                if (data.ok) {
                    await getMetrics();
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function bootstrapHome() {
            try {
                document.getElementById('homeDataSection').style.display = 'block';
                document.getElementById('homeDataPre').textContent = 'Loading...';

                const today = new Date().toISOString().slice(0, 10);
                const response = await fetch(`${API_BASE}/api/bootstrap/home`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: today })
                });
                const data = await response.json();

                document.getElementById('homeDataPre').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('homeDataPre').textContent = `Error: ${error.message}`;
            }
        }

        // Load health on startup
        window.addEventListener('load', checkHealth);
    </script>
</body>
</html>
