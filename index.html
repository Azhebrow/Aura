<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Шрифты: единый список в src/config/fontFamilies.js, подключение через src/fonts-head.js -->
    <script type="module" src="src/fonts-head.js"></script>
    <link rel="stylesheet" href="src/design-system/index.css">
    <script>
        (function() {
            const validThemes = ['light', 'dim', 'dark'];
            const savedTheme = localStorage.getItem('aura-theme');
            const theme = validThemes.includes(savedTheme) ? savedTheme : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <!-- Экран загрузки -->
    <div id="splash-screen-container"></div>
    
    <!-- Кастомная шапка приложения -->
    <div id="title-bar-container"></div>
    
    <div class="page">
        <main class="page-content"></main>
        <div class="top-navigation-container"></div>
        <div class="bottom-navigation-container"></div>
    </div>

    <script type="module" src="src/index.js"></script>
</body>
</html>
